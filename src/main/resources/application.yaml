spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  application:
    name: smart-vision
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: 0
      timeout: 3000ms
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  capability-provider:
    embedding: aliyun
    rerank: aliyun
    gen: aliyun
    ocr: aliyun
    object-storage: aliyun
  security:
    admin-secret: ${APP_ADMIN_SECRET}
    encrypt-key: ${APP_ENCRYPT_KEY}
    encrypt-iv: ${APP_ENCRYPT_IV}
  embedding:
    image-input-mode: auto
  search:
    quality-absolute-min-score: 0.72
    vector-min-score: 0.6
    escli:
      # Optional allowlist for ES CLI accessible indices (supports wildcard '*').
      # When empty, defaults to vector read/write alias and physical index.
      allowed-index-patterns: []
    rrf:
      enabled: true
      native-enabled: false
      rank-constant: 60
      candidate-multiplier: 4
      max-candidates: 200
    rerank:
      enabled: true
      model: gte-rerank-v2
      max-doc-chars: 1200
      window-enabled: true
      window-size: 40
      window-factor: 3
      window-min: 20
      window-max: 80
      fusion-alpha: 0.6
      fusion-beta: 0.4
  compare:
    max-text-length: 500
    high-threshold: 0.8
    medium-threshold: 0.6
  debug:
    strategy-header-enabled: false

logging:
  level:
    co.elastic.clients: WARN
    org.springframework.boot.autoconfigure.elasticsearch: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
